<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1, user-scalable=no">
    <meta name="theme-color" content="#0f1117">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>Admin</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='app-mobile.css') }}">
</head>
<body class="mobile-app">
    <div id="auth-screen" class="screen auth-screen">
        <div class="auth-brand">
            <div class="logo" aria-hidden="true">⚙️</div>
            <h1>Admin</h1>
            <p>Sign in with an admin account</p>
        </div>
        <div class="auth-card">
            <h2>Admin login</h2>
            <form id="auth-form">
                <div class="form-field">
                    <label for="username">Username</label>
                    <input type="text" id="username" autocomplete="username" required>
                </div>
                <div class="form-field">
                    <label for="password">Password</label>
                    <input type="password" id="password" autocomplete="current-password" required>
                </div>
                <button type="submit" class="btn btn-primary btn-block">Login</button>
            </form>
            <p style="text-align:center;margin-top:16px;">
                <a href="/app/" class="link-back">← Back to app</a>
            </p>
            <div id="auth-message" class="message" role="status"></div>
        </div>
    </div>

    <div id="admin-screen" class="screen" hidden>
        <header class="top-bar">
            <a href="/app/" class="link-back">← App</a>
            <h1 id="top-title">Tests</h1>
            <span id="username-display" class="user-chip"></span>
        </header>

        <main class="content-area">
            <section id="panel-tests" class="panel active">
                <div class="toolbar-row">
                    <h2 class="panel-title">Tests</h2>
                    <button type="button" id="btn-new-test" class="btn-icon-text">+ New</button>
                </div>
                <div id="save-message" class="message" role="status"></div>
                <div id="tests-list-admin"></div>
            </section>

            <section id="panel-users" class="panel">
                <h2 class="panel-title">Users</h2>
                <div class="settings-section">
                    <h3 id="user-form-title">Create user</h3>
                    <div class="form-field">
                        <label for="user-username">Username</label>
                        <input type="text" id="user-username" placeholder="Username" required>
                    </div>
                    <div class="form-field">
                        <label for="user-password">Password</label>
                        <input type="password" id="user-password" placeholder="Min 4 characters" required>
                    </div>
                    <div class="form-field">
                        <label for="user-role">Role</label>
                        <select id="user-role">
                            <option value="user">User</option>
                            <option value="admin">Admin</option>
                        </select>
                    </div>
                    <div class="btn-row">
                        <button type="button" id="btn-user-cancel" class="btn btn-secondary" hidden>Cancel</button>
                        <button type="button" id="btn-user-save" class="btn btn-primary">Create user</button>
                    </div>
                    <div id="user-create-message" class="message" role="status"></div>
                </div>
                <h3 class="panel-title" style="font-size:1rem;">Existing users</h3>
                <div id="users-list-admin"></div>
            </section>

            <section id="panel-scores" class="panel">
                <h2 class="panel-title">All scores</h2>
                <div id="admin-scores-list"></div>
            </section>

            <section id="panel-settings" class="panel">
                <h2 class="panel-title">Settings</h2>
                <div class="settings-section">
                    <h3>Registration</h3>
                    <label class="checkbox-inline">
                        <input type="checkbox" id="registration-toggle">
                        Allow new user registration
                    </label>
                    <p id="registration-status" class="admin-card-meta" style="margin-top:8px;"></p>
                    <button type="button" id="btn-save-registration" class="btn btn-primary btn-block" style="margin-top:12px;">Save</button>
                    <div id="registration-message" class="message" role="status"></div>
                </div>
                <div class="settings-section">
                    <h3>Test retakes</h3>
                    <label class="checkbox-inline">
                        <input type="checkbox" id="retake-toggle">
                        Allow users to retake tests
                    </label>
                    <p id="retake-status" class="admin-card-meta" style="margin-top:8px;"></p>
                    <button type="button" id="btn-save-retake" class="btn btn-primary btn-block" style="margin-top:12px;">Save</button>
                    <div id="retake-message" class="message" role="status"></div>
                </div>
            </section>
        </main>

        <nav class="bottom-nav" aria-label="Admin navigation">
            <button type="button" class="nav-item active" data-tab="tests" id="nav-tests">
                <span class="nav-icon" aria-hidden="true">📝</span>Tests
            </button>
            <button type="button" class="nav-item" data-tab="users" id="nav-users">
                <span class="nav-icon" aria-hidden="true">👥</span>Users
            </button>
            <button type="button" class="nav-item" data-tab="scores" id="nav-scores">
                <span class="nav-icon" aria-hidden="true">📊</span>Scores
            </button>
            <button type="button" class="nav-item" data-tab="settings" id="nav-settings">
                <span class="nav-icon" aria-hidden="true">⚙️</span>Settings
            </button>
        </nav>
    </div>

    <!-- Test editor overlay -->
    <div id="test-form-overlay" class="form-overlay" aria-hidden="true">
        <header class="form-overlay-header">
            <button type="button" id="btn-close-test-form" class="btn-back">← Close</button>
            <h2 id="test-form-title">New test</h2>
        </header>
        <div class="form-overlay-body">
            <div class="form-field">
                <label for="test-title">Title</label>
                <input type="text" id="test-title" placeholder="e.g. Basic Arabic Vocabulary" required>
            </div>
            <div class="form-field">
                <label for="test-description">Description</label>
                <textarea id="test-description" placeholder="What this test covers" rows="3"></textarea>
            </div>
            <div class="form-field">
                <label for="test-weight">Weight</label>
                <input type="number" id="test-weight" min="0.1" step="0.1" value="1" required>
            </div>
            <div class="form-field">
                <label for="test-max-questions">Max questions</label>
                <input type="number" id="test-max-questions" min="1" step="1" placeholder="Leave empty for all">
            </div>
            <label class="checkbox-inline">
                <input type="checkbox" id="test-enabled" checked>
                Published (visible to users)
            </label>
            <label class="checkbox-inline" style="margin-top:10px;">
                <input type="checkbox" id="test-record-score">
                Record scores when submitted
            </label>

            <h3 class="panel-title" style="font-size:1rem;margin-top:20px;">Questions</h3>
            <div id="questions-list"></div>
            <button type="button" id="btn-add-question" class="btn btn-secondary btn-block">+ Add question</button>
        </div>
        <footer class="form-overlay-footer">
            <button type="button" id="btn-cancel-test" class="btn btn-secondary">Cancel</button>
            <button type="button" id="btn-save-test" class="btn btn-primary">Save test</button>
        </footer>
    </div>

    <script src="{{ url_for('static', filename='admin.js') }}"></script>
</body>
</html>
