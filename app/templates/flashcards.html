<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1, user-scalable=no">
    <meta name="theme-color" content="#0f1117">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>Flashcards</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='app-shared.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='app-mobile.css') }}">
    <link id="ui-desktop-styles" rel="stylesheet" href="{{ url_for('static', filename='app-desktop.css') }}" disabled>
    <script src="{{ url_for('static', filename='ui-mode.js') }}"></script>
</head>
<body>
    <div id="main-screen" class="screen">
        <header class="top-bar">
            <a href="/app/" class="link-back">← App</a>
            <h1 id="top-title">Flashcards</h1>
            <div class="top-bar-actions">
                <button type="button" class="btn-back ui-mode-toggle-btn" data-ui-mode-toggle>Desktop view</button>
                <span id="username-display" class="user-chip"></span>
            </div>
        </header>

        <main class="content-area" style="padding-bottom: 16px;">
            <div id="lesson-selection-view">
                <h2 class="panel-title">Choose a lesson</h2>
                <div id="lessons-list"></div>
            </div>

            <div id="mode-selection-view" class="subview" hidden>
                <div class="test-view-header">
                    <button type="button" id="btn-back-lessons" class="btn-back">← Lessons</button>
                    <h2 id="selected-lesson-title" class="panel-title" style="margin:0;flex:1;font-size:1rem;"></h2>
                </div>
                <p class="panel-title" style="font-size:0.95rem;margin-top:16px;">Study mode</p>
                <div class="mode-grid">
                    <div class="mode-card" data-mode="english" role="button" tabindex="0">
                        <span class="mode-icon" aria-hidden="true">🇬🇧</span>
                        <div>
                            <h3>English first</h3>
                            <p>See English, tap to reveal Arabic</p>
                        </div>
                    </div>
                    <div class="mode-card" data-mode="arabic" role="button" tabindex="0">
                        <span class="mode-icon" aria-hidden="true">🇸🇦</span>
                        <div>
                            <h3>Arabic first</h3>
                            <p>See Arabic, tap to reveal English</p>
                        </div>
                    </div>
                </div>
            </div>

            <div id="flashcards-view" class="subview flashcard-stage" hidden>
                <div class="test-view-header" style="padding:0 16px;margin-top:0;">
                    <button type="button" id="btn-back-modes" class="btn-back">← Modes</button>
                    <h2 id="flashcards-title" style="font-size:0.95rem;margin:0;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;"></h2>
                    <span id="card-counter" class="counter-pill">0 / 0</span>
                </div>

                <div class="flashcard-toolbar">
                    <div class="font-slider-row">
                        <label for="font-size-slider">Size</label>
                        <input id="font-size-slider" type="range" min="20" max="56" step="1" value="32">
                        <span id="font-size-value">32</span>px
                    </div>
                </div>

                <div class="flashcard-wrap">
                    <div id="flashcard" class="flashcard" role="button" aria-label="Tap to flip card">
                        <div class="flashcard-inner">
                            <div class="flashcard-front">
                                <p id="front-text"></p>
                            </div>
                            <div class="flashcard-back">
                                <p id="back-text"></p>
                            </div>
                        </div>
                    </div>
                </div>

                <p class="flashcard-hint">Tap card to reveal · Swipe keys ← → on keyboard</p>

                <div class="flashcard-nav">
                    <div class="flashcard-nav-btns">
                        <button type="button" id="btn-prev" class="btn btn-secondary">← Prev</button>
                        <button type="button" id="btn-next" class="btn btn-secondary">Next →</button>
                    </div>
                    <div class="progress-bar">
                        <div id="progress-fill" class="progress-fill"></div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="{{ url_for('static', filename='flashcards.js') }}"></script>
</body>
</html>
